<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bison Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦬</text></svg>">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bison Tracker">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { width: 100%; height: 100vh; }

    .controls {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      z-index: 1000;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
      touch-action: manipulation;
    }

    .controls button {
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .controls button:hover:not(:disabled) { background: #1b4332; }
    .controls button:active:not(:disabled) { background: #1b4332; }
    .controls button:disabled { background: #ccc; cursor: not-allowed; }

    .snapshot-date.live { color: #c2410c; }

    .snapshot-info {
      text-align: center;
      flex: 1;
      min-width: 0;
    }

    .snapshot-date {
      font-size: 15px;
      font-weight: 600;
      color: #1b4332;
    }

    .snapshot-meta {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    @media (max-width: 480px) {
      .controls {
        width: auto;
        left: 8px;
        right: 8px;
        transform: none;
        bottom: 44px;
        padding: 10px 12px;
        gap: 8px;
        min-height: 72px;
      }

      .controls button {
        padding: 12px 14px;
      }

      .snapshot-date {
        font-size: 13px;
      }

      .snapshot-meta {
        font-size: 10px;
      }
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: white;
      padding: 20px 32px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="loading" id="loading">Loading snapshots...</div>
  <div class="controls" id="controls" style="display: none;">
    <button id="btn-prev" title="Previous snapshot">&larr; Prev</button>
    <div class="snapshot-info">
      <div class="snapshot-date" id="snapshot-date"></div>
      <div class="snapshot-meta" id="snapshot-meta"></div>
    </div>
    <button id="btn-next" title="Next snapshot">Next &rarr;</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
