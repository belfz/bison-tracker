<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bison Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦬</text></svg>">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bison Tracker">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { width: 100%; height: 100vh; }

    .controls {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      z-index: 1000;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
      touch-action: manipulation;
    }

    .controls button {
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .controls button:hover:not(:disabled) { background: #1b4332; }
    .controls button:active:not(:disabled) { background: #1b4332; }
    .controls button:disabled { background: #ccc; cursor: not-allowed; }

    .snapshot-date.live { color: #c2410c; }

    .snapshot-info {
      text-align: center;
      flex: 1;
      min-width: 0;
    }

    .snapshot-date {
      font-size: 15px;
      font-weight: 600;
      color: #1b4332;
    }

    .snapshot-meta {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    @media (max-width: 480px) {
      .controls {
        width: auto;
        left: 8px;
        right: 8px;
        transform: none;
        bottom: 44px;
        padding: 10px 12px;
        gap: 8px;
        min-height: 72px;
      }

      .controls button {
        padding: 12px 14px;
      }

      .snapshot-date {
        font-size: 13px;
      }

      .snapshot-meta {
        font-size: 10px;
      }
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: white;
      padding: 20px 32px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="loading" id="loading">Loading snapshots...</div>
  <div class="controls" id="controls" style="display: none;">
    <button id="btn-prev" title="Previous snapshot">&larr; Prev</button>
    <div class="snapshot-info">
      <div class="snapshot-date" id="snapshot-date"></div>
      <div class="snapshot-meta" id="snapshot-meta"></div>
    </div>
    <button id="btn-next" title="Next snapshot">Next &rarr;</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = "https://bison-tracker.bison-tracker.workers.dev"
    const BATCH_SIZE = 50
    const PREFETCH_THRESHOLD = 5

    const map = L.map("map").setView([52.8, 16.5], 8)

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(map)

    L.DomEvent.disableClickPropagation(document.getElementById("controls"))
    L.DomEvent.disableScrollPropagation(document.getElementById("controls"))

    const entries = []
    let currentIndex = 0
    let rectangleLayer = L.layerGroup().addTo(map)
    let allLoaded = false
    let fetching = false

    const btnPrev = document.getElementById("btn-prev")
    const btnNext = document.getElementById("btn-next")
    const snapshotDate = document.getElementById("snapshot-date")
    const snapshotMeta = document.getElementById("snapshot-meta")
    const loading = document.getElementById("loading")
    const controls = document.getElementById("controls")

    function timeEmoji(hour) {
      if (hour >= 6 && hour < 12) return "🌅"
      if (hour >= 12 && hour < 18) return "☀️"
      if (hour >= 18 && hour < 22) return "🌄"
      return "🌙"
    }

    function formatDate(iso) {
      const d = new Date(iso)
      const text = d.toLocaleDateString("en-GB", {
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      })
      return `${timeEmoji(d.getHours())} ${text}`
    }

    function updateControls() {
      btnPrev.disabled = !(currentIndex < entries.length - 1 || !allLoaded)
      btnNext.disabled = currentIndex <= 0
      const isLive = entries[currentIndex]?.snapshot.id === null
      snapshotDate.classList.toggle("live", isLive)
    }

    async function fetchBatch(beforeId) {
      if (fetching || allLoaded) return
      fetching = true
      try {
        const url = beforeId
          ? `${API_BASE}/api/snapshots/recent?limit=${BATCH_SIZE}&before=${beforeId}`
          : `${API_BASE}/api/snapshots/recent?limit=${BATCH_SIZE}`
        const res = await fetch(url)
        const batch = await res.json()
        if (batch.length < BATCH_SIZE) allLoaded = true
        entries.push(...batch)
        updateControls()
      } finally {
        fetching = false
      }
    }

    function renderSightings(sightings) {
      rectangleLayer.clearLayers()

      for (const s of sightings) {
        const bounds = [
          [s.bbox_min_lat, s.bbox_min_lon],
          [s.bbox_max_lat, s.bbox_max_lon],
        ]

        const rect = L.rectangle(bounds, {
          color: "#2d6a4f",
          weight: 2,
          fillColor: "#52b788",
          fillOpacity: 0.45,
        })

        const sexLabel = s.sex === "f" ? "Female" : s.sex === "m" ? "Male" : s.sex
        rect.bindPopup(
          `<strong>${s.num_individuals} individual${s.num_individuals !== 1 ? "s" : ""}</strong><br>(${sexLabel})`
        )

        rectangleLayer.addLayer(rect)
      }
    }

    async function showSnapshot(index) {
      if (index < 0 || index >= entries.length) return
      currentIndex = index
      const { snapshot, sightings } = entries[index]

      if (snapshot.id === null) {
        snapshotDate.textContent = "Live"
        snapshotMeta.textContent = `${sightings.length} sighting${sightings.length !== 1 ? "s" : ""} · just now`
      } else {
        snapshotDate.textContent = formatDate(snapshot.fetched_at)
        snapshotMeta.textContent = `Snapshot #${snapshot.id} · ${snapshot.feature_count} sighting${snapshot.feature_count !== 1 ? "s" : ""}`
      }

      renderSightings(sightings)
      updateControls()

      const remaining = entries.length - 1 - currentIndex
      if (remaining < PREFETCH_THRESHOLD && !allLoaded) {
        const lastStored = [...entries].reverse().find((e) => e.snapshot.id !== null)
        if (lastStored) await fetchBatch(lastStored.snapshot.id)
      }
    }

    btnPrev.addEventListener("click", () => showSnapshot(currentIndex + 1))
    btnNext.addEventListener("click", () => showSnapshot(currentIndex - 1))

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") btnPrev.click()
      if (e.key === "ArrowRight") btnNext.click()
    })

    async function init() {
      try {
        const [liveRes] = await Promise.allSettled([
          fetch(`${API_BASE}/api/snapshots/live`).then((r) =>
            r.ok ? r.json() : Promise.reject(),
          ),
          fetchBatch(),
        ])

        if (liveRes.status === "fulfilled") {
          entries.unshift(liveRes.value)
        }

        if (entries.length === 0) {
          loading.textContent = "No data available yet."
          return
        }

        loading.style.display = "none"
        controls.style.display = "flex"
        showSnapshot(0)
      } catch (err) {
        loading.textContent = `Error: ${err.message}`
      }
    }

    init()
  </script>
</body>
</html>
