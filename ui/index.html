<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bison Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { width: 100%; height: 100vh; }

    .controls {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      user-select: none;
    }

    .controls button {
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .controls button:hover:not(:disabled) { background: #1b4332; }
    .controls button:disabled { background: #ccc; cursor: not-allowed; }

    .snapshot-info {
      text-align: center;
      min-width: 200px;
    }

    .snapshot-date {
      font-size: 16px;
      font-weight: 600;
      color: #1b4332;
    }

    .snapshot-meta {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: white;
      padding: 20px 32px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="loading" id="loading">Loading snapshots...</div>
  <div class="controls" id="controls" style="display: none;">
    <button id="btn-prev" title="Previous snapshot">&larr; Prev</button>
    <div class="snapshot-info">
      <div class="snapshot-date" id="snapshot-date"></div>
      <div class="snapshot-meta" id="snapshot-meta"></div>
    </div>
    <button id="btn-next" title="Next snapshot">Next &rarr;</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = "https://bison-tracker.bison-tracker.workers.dev"

    const map = L.map("map").setView([52.8, 16.5], 8)

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(map)

    let snapshots = []
    let currentIndex = 0
    let rectangleLayer = L.layerGroup().addTo(map)

    const btnPrev = document.getElementById("btn-prev")
    const btnNext = document.getElementById("btn-next")
    const snapshotDate = document.getElementById("snapshot-date")
    const snapshotMeta = document.getElementById("snapshot-meta")
    const loading = document.getElementById("loading")
    const controls = document.getElementById("controls")

    function formatDate(iso) {
      const d = new Date(iso)
      return d.toLocaleDateString("en-GB", {
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      })
    }

    function updateButtons() {
      btnPrev.disabled = currentIndex >= snapshots.length - 1
      btnNext.disabled = currentIndex <= 0
    }

    async function loadSnapshot(snapshotId) {
      const res = await fetch(`${API_BASE}/api/snapshots/${snapshotId}`)
      const data = await res.json()
      return data
    }

    function renderSightings(sightings) {
      rectangleLayer.clearLayers()

      for (const s of sightings) {
        const bounds = [
          [s.bbox_min_lat, s.bbox_min_lon],
          [s.bbox_max_lat, s.bbox_max_lon],
        ]

        const rect = L.rectangle(bounds, {
          color: "#2d6a4f",
          weight: 2,
          fillColor: "#52b788",
          fillOpacity: 0.45,
        })

        const sexLabel = s.sex === "f" ? "Female" : s.sex === "m" ? "Male" : s.sex
        rect.bindPopup(
          `<strong>${s.num_individuals} individual${s.num_individuals !== 1 ? "s" : ""}</strong><br>(${sexLabel})`
        )

        rectangleLayer.addLayer(rect)
      }
    }

    async function showSnapshot(index) {
      currentIndex = index
      const snapshot = snapshots[index]

      snapshotDate.textContent = formatDate(snapshot.fetched_at)
      snapshotMeta.textContent = `Snapshot #${snapshot.id} · ${snapshot.feature_count} sighting${snapshot.feature_count !== 1 ? "s" : ""}`
      updateButtons()

      const data = await loadSnapshot(snapshot.id)
      renderSightings(data.sightings)
    }

    btnPrev.addEventListener("click", () => {
      if (currentIndex < snapshots.length - 1) showSnapshot(currentIndex + 1)
    })

    btnNext.addEventListener("click", () => {
      if (currentIndex > 0) showSnapshot(currentIndex - 1)
    })

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") btnPrev.click()
      if (e.key === "ArrowRight") btnNext.click()
    })

    async function init() {
      try {
        const res = await fetch(`${API_BASE}/api/snapshots?limit=1000`)
        snapshots = await res.json()

        if (snapshots.length === 0) {
          loading.textContent = "No snapshots yet. Wait for the first cron run."
          return
        }

        loading.style.display = "none"
        controls.style.display = "flex"
        await showSnapshot(0)
      } catch (err) {
        loading.textContent = `Error: ${err.message}`
      }
    }

    init()
  </script>
</body>
</html>
